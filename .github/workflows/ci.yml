name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start server and test
        run: |
          npm run dev &
          sleep 10
          curl -sf http://localhost:3000/ > /dev/null || exit 1
          curl -sf http://localhost:3000/api/trajectories > /dev/null || exit 1
          curl -sf http://localhost:3000/api/tasks > /dev/null || exit 1
